<!DOCTYPE html>
<html>
<head>
  <title>SiemensUN</title>
  <style>
    body {
      font-family: Arial;
      background: #000; /* Black background */
      color: #fff;      /* White text */
      margin: 0;
      text-align: center;
    }

    header {
      background: #111; /* Dark header */
      padding: 30px 0;
      font-size: 36px;
      font-weight: bold;
      color: #fff;
    }

    h1 {
      font-size: 48px;
      margin: 30px 0;
    }

    button {
      padding: 15px 30px;
      margin: 10px;
      border: 2px solid #fff; /* White border for contrast */
      border-radius: 10px;
      background: #000;       /* Black button */
      color: #fff;
      cursor: pointer;
      font-size: 18px;
      transition: transform 0.2s, background 0.2s, color 0.2s;
    }

    button:hover { 
      transform: scale(1.1); 
      background: #fff;
      color: #000;
    }

    .hidden { display: none; }

    .fade-in { animation: fadeIn 0.5s ease-in forwards; opacity: 0; }

    @keyframes fadeIn { to { opacity: 1; } }

    .container { padding: 20px; }

    .card {
      background: #111; /* Dark card */
      padding: 15px;
      margin: 10px auto;
      border-radius: 10px;
      cursor: pointer;
      max-width: 600px;
      transition: transform 0.2s, background 0.2s;
      border: 1px solid #fff; /* White border */
      text-align: left;
    }

    .card:hover { transform: scale(1.02); background: #222; }

    .details {
      margin-top: 10px;
      padding: 10px;
      background: #222;
      border-radius: 8px;
    }

    .operator { font-weight: bold; }
    .loco-type { font-style: italic; color: #facc15; }
  </style>
</head>
<body>

<header>SiemensUN</header>

<div class="container fade-in" id="intro">
  <h1>Welcome to SiemensUN</h1>
  <p>Helping trainspotters track tours and events across Australia.</p>
  <button onclick="startApp()">Let's Start</button>
</div>

<div class="container hidden" id="countries">
  <h2>Select a Country</h2>
  <button onclick="selectCountry('Australia')">Australia</button>
  <button onclick="selectCountry('Japan')">Japan</button>
  <button onclick="selectCountry('China')">China</button>
</div>

<div class="container hidden" id="regions">
  <h2 id="regionTitle">Select State/Province</h2>
  <div id="stateButtons"></div>
</div>

<div class="container hidden" id="toursContainer">
  <h2 id="toursTitle"></h2>
  <div id="tourCards"></div>
</div>

<script>
const countries = {
  "Australia": ["Victoria", "New South Wales", "Queensland"],
  "Japan": ["Hokkaido", "Kanto"],
  "China": ["Beijing", "Shanghai"]

// Example full VIC tours data (Steamrail, 707, SRHC)

      },
      {
        name: "Bendigo Easter Festival",
        operator: "707 Operations",
        date: "2026-04-05",
        type: "Steam and Diesel",
        locos: ["R711", "A66"],
        description: "Return trip from Melbourne to Bendigo for a day at the Bendigo Easter Festival."
      },
      {
        name: "Essendon Steam Shuttles",
        operator: "Steamrail Victoria",
        date: "2026-04-18",
        type: "Steam",
        locos: ["2 steam locos"],
        description: "Step back into the 1950's and travel through Melbourne's suburbs from Essendon to Flinders Street."
      },
      {
        name: "Rail and Sail",
        operator: "Steamrail Victoria",
        date: "2026-04-26",
        type: "Steam",
        locos: ["TBA"],
        description: "Combine sea voyage with a heritage steam train for a day return between Melbourne and Geelong."
        
      },
       {
        name: "Maldon Experience",
        operator: "Steamrail Victoria",
        date: "2026-05-9",
        type: "Steam",
        locos: ["R711 and R761"],
        description: "Join Steamrail as we head for the historic goldfields town of Maldon, taking you back to a time when it was possible to “change trains” at Castlemaine for a branch line trip to Maldon."  
      },
       {
        name: "Hurstbridge Members Train",
        operator: "Steamrail Victoria",
        date: "2026-05-10",
        type: "Steam and diesel",
        description: "Join Steamrail Victoria for lunch in the Diamond Valley, as Y112 heads on a short return journey to Hurstbridge."  
      },
      {
        name: "TBC - Ballarat Shuttles",
        operator: "Steamrail Victoria",
        date: "2026-06-23 or 2026-06-24",
        type: "Steam",
        locos: ["TBA"],
        description: "Steam train rides from Ballarat to Yendon and return."  
      },
       {
        name: "Mordialloc Shuttles",
        operator: "Steamrail Victoria",
        date: "2026-06-13 or 2026-06-14",
        type: "Steam",
        locos: ["TBA"],
        description: "Steam train rides from Mordialloc Station. Tickets & more info coming soon."
      },
      {
        name: "Eureka Express",
        operator: "Steamrail Victoria",

      {

      {

      {

      {

        description: "Operate vintage steam engines with heritage electric carriages to the Hurstbridge Wattle Festival."
      },
    
      }
    ]
  }
};

function startApp() {
  document.getElementById("intro").classList.add("hidden");
  const countriesDiv = document.getElementById("countries");
  countriesDiv.classList.remove("hidden");
  countriesDiv.classList.add("fade-in");
}

function selectCountry(country) {
  document.getElementById("countries").classList.add("hidden");
  const regionsDiv = document.getElementById("regions");
  regionsDiv.classList.remove("hidden");
  regionsDiv.classList.add("fade-in");

  document.getElementById("regionTitle").innerText = `Select a state/province in ${country}`;

  const stateButtons = document.getElementById("stateButtons");
  stateButtons.innerHTML = "";
  countries[country].forEach(state => {
    const btn = document.createElement("button");
    btn.innerText = state;
    btn.onclick = () => showTours(country, state);
    stateButtons.appendChild(btn);
  });
}

function showTours(country, state) {
  document.getElementById("regions").classList.add("hidden");
  const toursContainer = document.getElementById("toursContainer");
  toursContainer.classList.remove("hidden");
  toursContainer.classList.add("fade-in");

  document.getElementById("toursTitle").innerText = `Tours in ${state}, ${country}`;

  const tourCards = document.getElementById("tourCards");
  tourCards.innerHTML = "";

  if (!toursData[country] || !toursData[country][state]) return;

  toursData[country][state].forEach(tour => {
    const card = document.createElement("div");
    card.className = "card fade-in";
    card.innerHTML = `
      <h3>${tour.name}</h3>
      <p class="operator">Operator: ${tour.operator}</p>
      <p class="loco-type">Type: ${tour.type}</p>
    `;

    const details = document.createElement("div");
    details.className = "details hidden";
    details.innerHTML = `
      <p>${tour.description}</p>
      <p>Locomotives: ${tour.locos.join(", ")}</p>
      <p>Date: ${tour.date}</p>
    `;

    card.appendChild(details);
    card.addEventListener("click", () => {
      details.classList.toggle("hidden");
    });

    tourCards.appendChild(card);
  });
}
</script>

</body>
</html>
